schema: agentcompanies/v1
kind: adapter-config
adapter: paperclip

# Company identity
company:
  slug: figurio
  name: Figurio

# Default budget for all agents (in cents/month)
defaultBudget: 10000

# Per-agent budget overrides
agentBudgets:
  ceo: 10000
  cto: 15000
  backend-engineer: 10000
  frontend-engineer: 10000
  ml-ai-engineer: 10000
  devops-engineer: 8000
  cmo: 10000
  content-creator: 6000
  head-of-operations: 8000

# Environment variable inputs — secrets injected at deploy time
env:
  secrets:
    - GH_TOKEN
    - DOCKER_HUB_USERNAME
    - DOCKER_HUB_TOKEN
    - STRIPE_SECRET_KEY
    - STRIPE_WEBHOOK_SECRET
    - DATABASE_URL
    - GEMINI_API_KEY
    - ELEVENLABS_API_KEY
  plain:
    - SENTRY_DSN
    - MEDIA_OUTPUT_DIR
    - GOOGLE_WORKSPACE_CLI_CREDENTIALS_FILE

# Slack integration
slack:
  workspace: 00aiworkspace.slack.com

# Infrastructure references
infrastructure:
  github:
    org: cellarwood
    repo: figurio
  dockerHub:
    username: lukekelle00
  kubernetes:
    context: microk8s-local
  stripe:
    account: Cellarwood
