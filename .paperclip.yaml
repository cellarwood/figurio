company:
  name: Figurio
  slug: figurio
  version: 0.1.0

adapterConfig:
  env:
    GH_TOKEN:
      source: secret
      required: true
    DOCKER_HUB_USERNAME:
      source: secret
      required: true
    DOCKER_HUB_TOKEN:
      source: secret
      required: true
    DATABASE_URL:
      source: secret
      required: false
    SENTRY_DSN:
      source: plain
      required: false
    GOOGLE_WORKSPACE_CLI_CREDENTIALS_FILE:
      source: plain
      required: true
      value: /paperclip/.gws/figurio.json
    GEMINI_API_KEY:
      source: secret
      required: false
    ELEVENLABS_API_KEY:
      source: secret
      required: false
    MEDIA_OUTPUT_DIR:
      source: plain
      required: false
      value: /paperclip/media
    STRIPE_SECRET_KEY:
      source: secret
      required: true
    STRIPE_WEBHOOK_SECRET:
      source: secret
      required: false

budgets:
  defaultMonthlyBudgetCents: 9000
  agents:
    ceo:
      monthlyBudgetCents: 12000
    cto:
      monthlyBudgetCents: 15000
    product-manager:
      monthlyBudgetCents: 9000
    backend-engineer:
      monthlyBudgetCents: 13000
    frontend-engineer:
      monthlyBudgetCents: 13000
    qa-engineer:
      monthlyBudgetCents: 8000
    cmo:
      monthlyBudgetCents: 11000
    content-creator:
      monthlyBudgetCents: 7000
    head-of-operations:
      monthlyBudgetCents: 9000
    customer-support:
      monthlyBudgetCents: 5000

agents:
  ceo:
    email: info@cellarwood.org
  product-manager:
    email: product-manager@cellarwood.org
  cmo:
    email: cmo@cellarwood.org
  content-creator:
    email: content-creator@cellarwood.org
  head-of-operations:
    email: head-of-operations@cellarwood.org
  customer-support:
    email: customer-support@cellarwood.org
