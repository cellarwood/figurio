schema: agentcompanies/v1

company:
  slug: figurio

adapterConfig:
  model: sonnet
  maxTurns: 50

agents:
  ceo:
    budget: 10000
  cto:
    budget: 15000
  cmo:
    budget: 12000
  head-of-operations:
    budget: 10000
  backend-engineer:
    budget: 20000
  frontend-engineer:
    budget: 20000
  content-creator:
    budget: 8000
  devops-engineer:
    budget: 15000

env:
  inputs:
    - name: GH_TOKEN
      description: GitHub personal access token
      required: true
    - name: DOCKER_HUB_USERNAME
      description: Docker Hub username
      required: true
    - name: DOCKER_HUB_TOKEN
      description: Docker Hub access token
      required: true
    - name: GEMINI_API_KEY
      description: Google Gemini API key for media generation
      required: true
    - name: ELEVENLABS_API_KEY
      description: ElevenLabs API key for text-to-speech
      required: false
    - name: STRIPE_SECRET_KEY
      description: Stripe secret API key
      required: true
    - name: STRIPE_WEBHOOK_SECRET
      description: Stripe webhook signing secret
      required: true
    - name: SLACK_WEBHOOK_URL
      description: Slack webhook for notifications
      required: false
