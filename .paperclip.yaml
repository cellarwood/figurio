schema: agentcompanies/v1
company: figurio

adapterConfig:
  model: claude-sonnet-4-6
  maxTurns: 50
  env:
    GH_TOKEN:
      source: secret
      key: GH_TOKEN
    DOCKER_HUB_USERNAME:
      source: secret
      key: DOCKER_HUB_USERNAME
    DOCKER_HUB_TOKEN:
      source: secret
      key: DOCKER_HUB_TOKEN
    STRIPE_SECRET_KEY:
      source: secret
      key: STRIPE_SECRET_KEY
    STRIPE_WEBHOOK_SECRET:
      source: secret
      key: STRIPE_WEBHOOK_SECRET
    DATABASE_URL:
      source: secret
      key: DATABASE_URL
    SENTRY_DSN:
      source: plain
      value: ""
    GEMINI_API_KEY:
      source: secret
      key: GEMINI_API_KEY
    ELEVENLABS_API_KEY:
      source: secret
      key: ELEVENLABS_API_KEY
    MEDIA_OUTPUT_DIR:
      source: plain
      value: /paperclip/media-output
    GOOGLE_WORKSPACE_CLI_CREDENTIALS_FILE:
      source: plain
      value: /paperclip/.gws/figurio.json

agents:
  ceo:
    budget: 10000
  cto:
    budget: 15000
  cmo:
    budget: 10000
  backend-engineer:
    budget: 12000
  frontend-engineer:
    budget: 12000
  ml-engineer:
    budget: 15000
  devops-engineer:
    budget: 10000
  content-creator:
    budget: 6000
  head-of-operations:
    budget: 8000
