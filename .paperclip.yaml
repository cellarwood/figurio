schema: paperclip/v1

agents:
  ceo:
    adapter:
      type: claude_local
      config:
        model: claude-sonnet-4-6
    budget:
      monthlyLimitCents: 10000
    inputs:
      env:
        GH_TOKEN:
          kind: secret
          requirement: optional
        GOOGLE_WORKSPACE_CLI_CREDENTIALS_FILE:
          kind: plain
          requirement: required
          default: /paperclip/.gws/figurio.json
        AGENT_EMAIL:
          kind: plain
          requirement: required
          default: figurio-ceo@cellarwood.org
        COMPANY_DOMAIN:
          kind: plain
          requirement: required
          default: cellarwood.org

  cto:
    adapter:
      type: claude_local
      config:
        model: claude-sonnet-4-6
    budget:
      monthlyLimitCents: 15000
    inputs:
      env:
        GH_TOKEN:
          kind: secret
          requirement: required
        DOCKER_HUB_USERNAME:
          kind: secret
          requirement: optional
        DOCKER_HUB_TOKEN:
          kind: secret
          requirement: optional
        DATABASE_URL:
          kind: secret
          requirement: optional

  cmo:
    adapter:
      type: claude_local
      config:
        model: claude-sonnet-4-6
    budget:
      monthlyLimitCents: 10000
    inputs:
      env:
        GEMINI_API_KEY:
          kind: secret
          requirement: required
        ELEVENLABS_API_KEY:
          kind: secret
          requirement: optional
        MEDIA_OUTPUT_DIR:
          kind: plain
          requirement: optional
          default: /workspace/media-output
        GOOGLE_WORKSPACE_CLI_CREDENTIALS_FILE:
          kind: plain
          requirement: required
          default: /paperclip/.gws/figurio.json
        AGENT_EMAIL:
          kind: plain
          requirement: required
          default: figurio-cmo@cellarwood.org
        COMPANY_DOMAIN:
          kind: plain
          requirement: required
          default: cellarwood.org

  backend-engineer:
    adapter:
      type: claude_local
      config:
        model: claude-sonnet-4-6
    budget:
      monthlyLimitCents: 15000
    inputs:
      env:
        GH_TOKEN:
          kind: secret
          requirement: required
        DATABASE_URL:
          kind: secret
          requirement: required
        STRIPE_SECRET_KEY:
          kind: secret
          requirement: required
        STRIPE_WEBHOOK_SECRET:
          kind: secret
          requirement: required

  frontend-engineer:
    adapter:
      type: claude_local
      config:
        model: claude-sonnet-4-6
    budget:
      monthlyLimitCents: 12000
    inputs:
      env:
        GH_TOKEN:
          kind: secret
          requirement: required

  ml-engineer:
    adapter:
      type: claude_local
      config:
        model: claude-sonnet-4-6
    budget:
      monthlyLimitCents: 12000
    inputs:
      env:
        GH_TOKEN:
          kind: secret
          requirement: required

  devops-engineer:
    adapter:
      type: claude_local
      config:
        model: claude-sonnet-4-6
    budget:
      monthlyLimitCents: 10000
    inputs:
      env:
        GH_TOKEN:
          kind: secret
          requirement: required
        DOCKER_HUB_USERNAME:
          kind: secret
          requirement: required
        DOCKER_HUB_TOKEN:
          kind: secret
          requirement: required
        SENTRY_DSN:
          kind: plain
          requirement: optional

  content-creator:
    adapter:
      type: claude_local
      config:
        model: claude-sonnet-4-6
    budget:
      monthlyLimitCents: 6000
    inputs:
      env:
        GEMINI_API_KEY:
          kind: secret
          requirement: required
        ELEVENLABS_API_KEY:
          kind: secret
          requirement: optional
        MEDIA_OUTPUT_DIR:
          kind: plain
          requirement: optional
          default: /workspace/media-output
        GOOGLE_WORKSPACE_CLI_CREDENTIALS_FILE:
          kind: plain
          requirement: required
          default: /paperclip/.gws/figurio.json
        AGENT_EMAIL:
          kind: plain
          requirement: required
          default: figurio-content@cellarwood.org
        COMPANY_DOMAIN:
          kind: plain
          requirement: required
          default: cellarwood.org

  head-of-operations:
    adapter:
      type: claude_local
      config:
        model: claude-sonnet-4-6
    budget:
      monthlyLimitCents: 8000
    inputs:
      env:
        STRIPE_SECRET_KEY:
          kind: secret
          requirement: required
        GOOGLE_WORKSPACE_CLI_CREDENTIALS_FILE:
          kind: plain
          requirement: required
          default: /paperclip/.gws/figurio.json
        AGENT_EMAIL:
          kind: plain
          requirement: required
          default: figurio-ops@cellarwood.org
        COMPANY_DOMAIN:
          kind: plain
          requirement: required
          default: cellarwood.org

routines:
  weekly-strategic-review:
    triggers:
      - kind: schedule
        cronExpression: "0 9 * * 1"
        timezone: Europe/Prague
  ip-compliance-review:
    triggers:
      - kind: schedule
        cronExpression: "0 14 * * 3"
        timezone: Europe/Prague
